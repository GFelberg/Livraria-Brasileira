{% load static %}

<!DOCTYPE html>
<html lang="pt-br">

    {% include "acervos/partials/_head.html" %}
    <body>

        <!-- Navigation-->
        {% include "acervos/partials/_navigation.html" %}
        <!-- Header-->
        <header class="bg-dark py-5">
            <div class="container px-4 px-lg-5 my-5">
                <div class="text-center text-white">
                    <h1 class="display-4 fw-bolder">Informações da Conta</h1>
                    <p class="lead fw-normal text-white-50 mb-0">Atualize ou verifique suas informações sempre que houver necessidade
                    </p>
                </div>
            </div>
        </header>
        <style>
        .form-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 75vh;
            margin-top: -5%;
            margin-bottom: -5%;
        }
    
        form {
            max-width: 400px;
        }
    
        .form-group {
            margin-bottom: 20px;
        }
    
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
    
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
    
        .form-row {
            display: flex;
            justify-content: space-between;
        }
    
        button {
            background-color: white;
            color: black;
            padding: 10px;
            cursor: pointer;
        }
    
        button:hover {
            background-color: black;
            color: white;
            opacity: 1
        }
        </style>
        <section class="py-5 form-container">
            <form>
                <div class="form-row">
                    <div class="form-group" style="flex: 1;">
                        <label style="color: white" for="name">Nome</label>
                        <input type="text"
                               id="name"
                               name="name"
                               placeholder="Nome"
                               autocomplete="off"
                               style="width: 200px"
                               required>
                    </div>
                    <div class="form-group" style="margin-left: 30px; flex: 1;">
                        <label style="color: white" for="email">Email</label>
                        <input type="email"
                               id="email"
                               name="email"
                               placeholder="Email"
                               autocomplete="off"
                               style="width: 200px"
                               required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group" style="flex: 1;">
                        <label style="color: white" for="password">Senha</label>
                        <input type="password"
                               id="password"
                               name="password"
                               placeholder="Senha"
                               autocomplete="new-password"
                               style="width: 200px"
                               required>
                    </div>
                    <div class="form-group" style="margin-left: 30px; flex: 1;">
                        <label style="color: white" for="confirm-password">Confirmar Senha</label>
                        <input type="password"
                               id="confirm-password"
                               name="confirm-password"
                               placeholder="Confirmar Senha"
                               autocomplete="new-password"
                               style="width: 200px">
                    </div>
                </div>
                <button type="submit">Atualizar</button>
            </form>
        </section>
        <!-- Footer-->
        {% include "acervos/partials/_footer.html" %}
        <!-- Bootstrap core JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
