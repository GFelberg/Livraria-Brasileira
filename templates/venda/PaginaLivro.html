{% load static %}

<!DOCTYPE html>
<html lang="en">
    {% include "acervos/partials/_head.html" %}
    <body>
        <!-- Navigation-->
        {% include "acervos/partials/_navigation.html" %}
        <!-- Product section-->
        <section class="py-5">
            <div class="container text-center">
                <div class="row">
                    <div class="card h-100">
                        <!-- Product image-->
                        <img src="{% static "https://dummyimage.com/600x700/dee2e6/6c757d.jpg" %}" class="card-img-top" alt="..." height="400px">
                        <div class="card-body">
                            <!-- Product name-->
                            <h5 class="fw-bolder text-dark">Item</h5>
                            <li>
                            <!-- Product reviews-->
                            <div class="d-flex justify-content-center small text-warning mb-2">
                                <i class="fas fa-star"></i>
                                <i class="fas fa-star"></i>
                                <i class="fas fa-star"></i>
                                <i class="far fa-star"></i>
                                <i class="far fa-star"></i>
                            </div>
                            <!-- Product price-->
                            <li>
                            <p class="card-text text-dark">Inserir Preço Aqui</p>
                            <li>
                            <div class="text-center"><a class="btn btn-outline-dark mt-auto" href="{% static "Carrinho" %}">Adicionar ao Carrinho</a></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <!-- Footer-->
        {% include "acervos/partials/_footer.html" %}
        <!-- Bootstrap core JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
